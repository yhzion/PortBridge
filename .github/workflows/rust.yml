name: Rust

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-test:
    name: Build, test, format
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Build
        run: cargo build --workspace --verbose

      - name: Test
        run: cargo test --workspace --verbose

      # fmt is platform-independent — run it once (ubuntu) to avoid matrix dupes.
      - name: Format check
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --all -- --check
